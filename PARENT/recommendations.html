<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations - KinderCura</title>
    <link rel="stylesheet" href="/css/dashboard-new-styles.css">
    <link rel="stylesheet" href="/css/recommendations-styles.css">
    <link rel="stylesheet" href="/css/notifications-styles.css">
    <link rel="stylesheet" href="/notifications-card-ui.css">
</head>
<body>
    <header class="top-nav">
        <div class="nav-container">
            <a href="/parent/dashboard.html" class="logo"><img src="/icons/logo.png" class="logo-img"><span class="logo-text"><span class="logo-kinder">Kinder</span><span class="logo-cura">Cura</span></span></a>
            <nav class="main-nav">
                <a href="/parent/dashboard.html" class="nav-link">Dashboard</a>
                <a href="/parent/results.html" class="nav-link">Results</a>
                <a href="/parent/recommendations.html" class="nav-link active">Recommendations</a>
                <a href="/parent/appointments.html" class="nav-link">Appointments</a>
                <a href="/parent/chat.html" class="nav-link">Chat</a>
                <a href="/parent/custom-questions.html" class="nav-link">Questions</a>
            </nav>
            <div class="nav-right">
                <button class="icon-btn notification-btn" onclick="openNotifications()"><img src="/icons/notif_bell.png" class="notification-icon" style="width:24px;height:24px;object-fit:contain;display:block;"><span class="notification-badge">0</span></button>
                <button class="icon-btn profile-btn" onclick="toggleProfileMenu()"><img src="/icons/profile.png" class="profile-icon" style="width:36px;height:36px;border-radius:50%;object-fit:cover;display:block;"></button>
                <div class="profile-menu" id="profileMenu" style="display:none;">
                    <div class="menu-header"><p id="navWelcome">Welcome</p></div>
                    <a href="/parent/profile.html" class="menu-item"><img src="/icons/profile_icon.png" class="menu-icon">Profile</a>
                    <a href="/parent/settings.html" class="menu-item"><img src="/icons/settings.png" class="menu-icon">Settings</a>
                    <hr style="margin:0.5rem 0;">
                    <a href="#" class="menu-item logout"><img src="/icons/logout.png" class="menu-icon">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="dashboard-container">
        <div style="background:white;padding:2rem;border-radius:15px;margin-bottom:2rem;box-shadow:0 4px 15px rgba(0,0,0,0.08);display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;">
            <div>
                <h1 style="margin-bottom:0.5rem;">Personalized Recommendations</h1>
                <p style="color:var(--text-light);" id="recMeta">Based on your child's latest assessment</p>
            </div>
            <div id="childSwitchWrap"></div>
        </div>
        <div id="recsContent">
            <div style="text-align:center;padding:3rem;background:white;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.08);">
                <p style="color:var(--text-light);">Loading recommendations…</p>
            </div>
        </div>
    </div>

<div class="notification-modal notifications-modal" id="notificationsModal" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="notificationsTitle">
    <div class="notification-modal-content notifications-content" role="document">
        <div class="notification-modal-header notifications-header">
            <h3 id="notificationsTitle">Notifications</h3>
            <button type="button" class="notif-close close-btn" onclick="closeNotifications()" aria-label="Close notifications">&times;</button>
        </div>
        <div class="notification-action-bar clear-all-row">
            <button type="button" class="clear-all-btn" id="clearNotificationsBtn" onclick="clearAllNotifications()">Clear all</button>
        </div>
        <div class="notification-list notifications-list" id="notificationsList" role="list">
            <p class="notifications-empty">Loading...</p>
        </div>
    </div>
</div>

    <script src="/api.js"></script>
<script src="/notifications-card-ui.js"></script>
<script src="/js/parent/recommendations.js"></script>
</body>
</html>
